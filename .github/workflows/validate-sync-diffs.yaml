name: "Validate sync diffs"
on:
  pull_request:
    branches:
      - main
      - adopt-sync-patch
  push:
    branches-ignore:
      - 'main#release#*'

jobs:
  check:
    if: "!startsWith(github.head_ref, 'main#release#')"
    name: "Check sync.sh was called"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download vendir
        uses: giantswarm/install-binary-action@e2730babbc89f02ef1559b042d33cbe24f5c3547 # v4.0.2
        with:
          binary: "vendir"
          version: "0.40.2"
          download_url: "https://github.com/carvel-dev/vendir/releases/download/v${version}/vendir-linux-amd64"
          smoke_test: "${binary} --version"

      - name: Run sync.sh
        run: |
          ./sync/sync.sh
      - name: Check there is no diff
        run: |
          git diff --exit-code
