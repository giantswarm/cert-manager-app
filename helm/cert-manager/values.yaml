# Giant Swarm cert-manager-app parent chart values.
#
# The upstream cert-manager chart is vendored as a subchart under
# `charts/cert-manager`. Its values live under the `cert-manager:` key below.
#
# Giant-Swarm-only objects (VerticalPodAutoscalers, PodLogs, NetworkPolicies) are
# rendered by templates in this parent chart and read the top-level values here.
# Values that both the parent templates and the subchart need are defined once
# (with a YAML anchor) at the top level and aliased into the `cert-manager:` block,
# so a single definition stays in sync across both.

global:
  # Tenant to use for monitoring (propagated to the subchart via Helm globals).
  tenant: giantswarm
  # Team that owns the resources; used for the application.giantswarm.io/team label.
  team: shield

# HTTP(S) proxy settings. When a proxy URL (http and/or https) is set,
# templates/proxy.yaml renders a ConfigMap whose keys are injected as
# HTTP_PROXY/HTTPS_PROXY/NO_PROXY env vars (via extraEnv) into the cert-manager
# controller, webhook and cainjector. noProxy is optional. These are the
# user-facing overrides and take precedence over the cluster-provided
# `cluster.proxy` values below.
proxy:
  # HTTP proxy URL.
  http: ""
  # HTTPS proxy URL.
  https: ""
  # Comma separated list of domains excluded from using the HTTP proxy.
  noProxy: ""

# Cluster-provided settings (injected by the cluster charts).
cluster:
  # HTTP proxy settings. Overridden by the top-level `proxy` values when set.
  proxy:
    # HTTP proxy URL.
    http: ""
    # HTTPS proxy URL.
    https: ""
    # Comma separated list of domains excluded from using the HTTP proxy.
    noProxy: ""

# Preserve the resource names and selector labels of existing installations.
# Anchored here and aliased into the `cert-manager:` block so the subchart renders
# identical names/labels (cert-manager-app, app.kubernetes.io/name: cert-manager-app).
nameOverride: &nameOverride cert-manager-app
fullnameOverride: &fullnameOverride cert-manager-app

# VerticalPodAutoscaler for the controller (rendered by templates/controller-vpa.yaml).
verticalPodAutoscaler:
  enabled: true
  controlledValues: "RequestsAndLimits"
  mode: "Auto"
  updatePolicy:
    updateMode: "Auto"
  # minAllowed defaults to the controller resource requests below if unset.
  # maxAllowed: unset = unlimited scaling.

# Controller resources. Anchored: the VPA minAllowed default reads these, and the
# subchart controller Deployment receives the same values via the alias below.
resources: &controllerResources
  requests:
    cpu: 50m
    memory: 100Mi
  limits:
    cpu: 500m
    memory: 1Gi

# Controller log collection (rendered by templates/controller-podlogs.yaml).
podLogs:
  enabled: true
  # Specify the tenant, defaults to global.tenant if not set.
  tenant:
  annotations: {}
  labels: {}
  relabelings: []

webhook:
  # VerticalPodAutoscaler for the webhook (rendered by templates/webhook-vpa.yaml).
  verticalPodAutoscaler:
    enabled: true
    controlledValues: "RequestsAndLimits"
    mode: "Auto"
    updatePolicy:
      updateMode: "Auto"
    minAllowed:
      cpu: 20m
      memory: 50Mi
  # Webhook resources (anchored, aliased into the subchart webhook below).
  resources: &webhookResources
    requests:
      cpu: 20m
      memory: 50Mi
    limits:
      cpu: 100m
      memory: 100Mi
  # Webhook log collection (rendered by templates/webhook-podlogs.yaml).
  podLogs:
    enabled: true
    tenant:
    annotations: {}
    labels: {}
    relabelings: []

cainjector:
  # Whether the cainjector is enabled (anchored, aliased into the subchart).
  enabled: &cainjectorEnabled true
  # VerticalPodAutoscaler for the cainjector (rendered by templates/cainjector-vpa.yaml).
  verticalPodAutoscaler:
    enabled: true
    controlledValues: "RequestsAndLimits"
    mode: "Auto"
    updatePolicy:
      updateMode: "Auto"
  # Cainjector resources (anchored, aliased into the subchart cainjector below).
  resources: &cainjectorResources
    requests:
      cpu: 20m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 1Gi
  # Cainjector log collection (rendered by templates/cainjector-podlogs.yaml).
  podLogs:
    enabled: true
    tenant:
    annotations: {}
    labels: {}
    relabelings: []

# Giant Swarm NetworkPolicies (rendered by templates/networkpolicy.yaml and
# templates/cainjector-networkpolicy.yaml). Also gate the GS netpol subcharts.
giantswarmNetworkPolicy:
  enabled: true

ciliumNetworkPolicy:
  enabled: false

# -----------------------------------------------------------------------------
# Vendored upstream cert-manager chart values.
# Only Giant Swarm overrides of upstream defaults are set here; everything else
# comes from charts/cert-manager/values.yaml.
# -----------------------------------------------------------------------------
cert-manager:

  # Proxy env vars sourced from the cert-manager-app-proxy ConfigMap (rendered by
  # templates/proxy.yaml only when proxy values are set).
  extraEnv: &proxyEnv
    - name: HTTP_PROXY
      valueFrom:
        configMapKeyRef:
          name: cert-manager-app-proxy
          key: http_proxy
          optional: true
    - name: HTTPS_PROXY
      valueFrom:
        configMapKeyRef:
          name: cert-manager-app-proxy
          key: https_proxy
          optional: true
    - name: NO_PROXY
      valueFrom:
        configMapKeyRef:
          name: cert-manager-app-proxy
          key: no_proxy
          optional: true

  crds:
    enabled: true

  # Giant Swarm re-hosts the upstream images under gsoci.azurecr.io/giantswarm/.
  # These apply to every component (controller, webhook, cainjector, acmesolver,
  # startupapicheck); the upstream per-component image.name defaults already match,
  # so no per-component image overrides are needed.
  imageRegistry: gsoci.azurecr.io
  imageNamespace: giantswarm

  resources: *controllerResources

  securityContext:
    runAsUser: 1000
    runAsGroup: 1000
  containerSecurityContext:
    runAsNonRoot: true

  tolerations: &controlPlaneTolerations
    - key: node-role.kubernetes.io/master
      effect: NoSchedule
    - key: node-role.kubernetes.io/control-plane
      effect: NoSchedule

  livenessProbe:
    enabled: false

  prometheus:
    servicemonitor:
      enabled: true
      endpointAdditionalProperties:
        relabelings:
          - action: replace
            regex: ;(.*)
            replacement: $1
            separator: ;
            sourceLabels:
              - namespace
              - __meta_kubernetes_namespace
            targetLabel: namespace
          - action: replace
            sourceLabels:
              - __meta_kubernetes_pod_label_app
            targetLabel: app
          - action: replace
            sourceLabels:
              - __meta_kubernetes_pod_node_name
            targetLabel: node

  webhook:
    replicaCount: 2
    securityContext:
      runAsUser: 1000
      runAsGroup: 1000
    containerSecurityContext:
      runAsNonRoot: true
    podDisruptionBudget:
      enabled: true
      minAvailable: "50%"
    resources: *webhookResources
    extraEnv: *proxyEnv
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: apps.giantswarm.io/affinity
                    operator: In
                    values:
                      - cert-manager-webhook
                  - key: app.kubernetes.io/component
                    operator: In
                    values:
                      - "webhook"
              topologyKey: kubernetes.io/hostname
            weight: 100
    tolerations: *controlPlaneTolerations
    podLabels:
      apps.giantswarm.io/affinity: cert-manager-webhook
    networkPolicy:
      enabled: true

  cainjector:
    enabled: *cainjectorEnabled
    securityContext:
      runAsUser: 1000
      runAsGroup: 1000
    containerSecurityContext:
      runAsNonRoot: true
    podDisruptionBudget:
      minAvailable: "50%"
    resources: *cainjectorResources
    extraEnv: *proxyEnv
    tolerations: *controlPlaneTolerations

  startupapicheck:
    enabled: false
    containerSecurityContext:
      runAsNonRoot: true
    resources:
      requests:
        cpu: 20m
        memory: 64Mi
    tolerations: *controlPlaneTolerations
