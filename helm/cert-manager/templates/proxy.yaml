{{- $proxy := deepCopy .Values.cluster.proxy | mustMerge .Values.proxy -}}
{{- if and $proxy.http $proxy.https $proxy.noProxy -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cert-manager.fullname" . }}-proxy
  namespace: {{ include "cert-manager.namespace" . }}
  labels:
    app: {{ include "cert-manager.name" . }}
    app.kubernetes.io/name: {{ include "cert-manager.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- include "labels" . | nindent 4 }}
data:
  http_proxy: {{ $proxy.http | quote }}
  https_proxy: {{ $proxy.https | quote }}
  no_proxy: {{ $proxy.noProxy | quote }}
{{- end }}
